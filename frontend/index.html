<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qubicoin STG Dashboard</title>
  <!-- Menghubungkan CSS Eksternal -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    
    <!-- HEADER -->
    <header class="dashboard-header">
      <div class="brand">
        <h1>Qubicoin <span>STG</span></h1>
      </div>
      <button id="btnConnect" onclick="window.connectWallet()" class="btn-connect">
        Connect Wallet
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="dashboard-main">
      
      <!-- WALLET INFO CARD -->
      <section class="card info-card">
        <h3>Wallet Status</h3>
        <div class="info-group">
          <label>Address:</label>
          <span id="walletAddress">Not Connected</span>
        </div>
        <div class="balances-grid">
          <div class="balance-item">
            <label>ETH Balance</label>
            <div class="balance-value"><span id="ethBalance">0.0000</span> ETH</div>
          </div>
          <div class="balance-item">
            <label>QBC Balance</label>
            <div class="balance-value"><span id="tokenBalance">0.0000 QBC</span></div>
          </div>
        </div>
      </section>

      <!-- TRANSFER INTERFACE -->
      <section class="card transfer-card">
        <h3>Send Qubicoin</h3>
        <div class="form-group">
          <label for="recipientInput">Recipient Address</label>
          <input type="text" id="recipientInput" placeholder="0x..." />
        </div>
        <div class="form-group">
          <label for="amountInput">Amount (QBC)</label>
          <input type="number" id="amountInput" placeholder="0.0" step="any" />
        </div>
        <button onclick="window.transferToken()" class="btn-send">
          Send Tokens
        </button>
      </section>

      <!-- TRANSACTION LOG -->
      <section class="card history-card">
        <div class="history-header">
          <h3>Transaction History</h3>
          <button onclick="window.clearTransactions()" class="btn-clear">Clear</button>
        </div>
        <div id="txLog" class="tx-log-container">
          <div class="empty-tx">No transactions yet.</div>
        </div>
      </section>

    </main>
  </div>

  <!-- DEPENDENCIES & CORE LOGIC -->
  <!-- 1. Ethers.js Library (Wajib di atas) -->
  <script src="https://jsdelivr.net"></script>
  
  <!-- 2. Logic App Utama -->
  <script src="app.js"></script>

</body>
</html>
